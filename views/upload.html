<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linguaid Eval — New Candidate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
  .nav { background: #1F4E79; color: white; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { font-size: 18px; font-weight: 700; }
  .nav-right a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
  h1 { font-size: 22px; font-weight: 600; color: #1F4E79; margin-bottom: 0.5rem; }
  .sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .drop-zone { border: 2px dashed #CBD5E1; border-radius: 10px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 1.5rem; }
  .drop-zone:hover, .drop-zone.drag { border-color: #2E75B6; background: #EFF6FF; }
  .drop-zone-icon { font-size: 36px; margin-bottom: 0.75rem; }
  .drop-zone-text { font-size: 15px; color: #444; margin-bottom: 0.25rem; }
  .drop-zone-sub { font-size: 13px; color: #999; }
  .file-name { font-size: 13px; color: #2E75B6; margin-top: 0.5rem; font-weight: 500; }
  .btn { background: #1F4E79; color: white; border: none; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .back { font-size: 13px; color: #666; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
  .back:hover { color: #1F4E79; }
  .msg { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-top: 1rem; display: none; }
  .msg.error { background: #fef2f2; color: #991b1b; display: block; }
  .msg.success { background: #f0fdf4; color: #166534; display: block; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">linguaid eval</div>
  <div class="nav-right"><a href="/logout">Sign out</a></div>
</nav>
<div class="container">
  <a href="/candidates" class="back">← Back to candidates</a>
  <h1>New Candidate</h1>
  <p class="sub">Upload the Typeform CSV export to create a new candidate file.</p>
  <div class="card">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">Click to select CSV file</div>
      <div class="drop-zone-sub">or drag and drop here</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".csv" style="display:none">
    <button class="btn" id="uploadBtn" disabled onclick="uploadFile()">Upload and create candidate</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
  let selectedFile = null;
  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInput');
  const btn = document.getElementById('uploadBtn');
  const fn = document.getElementById('fileName');
  const msg = document.getElementById('msg');

  fi.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });

  function setFile(file) {
    selectedFile = file;
    fn.textContent = file.name;
    btn.disabled = false;
  }

  function uploadFile() {
    if (!selectedFile) return;
    btn.disabled = true;
    btn.textContent = 'Uploading...';
    const fd = new FormData();
    fd.append('csv', selectedFile);
    fetch('/candidates/upload-csv', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          msg.className = 'msg success';
          msg.textContent = 'Candidate created. Redirecting...';
          setTimeout(() => window.location.href = '/candidates/' + data.id, 1200);
        } else {
          throw new Error(data.error || 'Upload failed');
        }
      })
      .catch(err => {
        msg.className = 'msg error';
        msg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Upload and create candidate';
      });
  }
</script>
</body>
</html>
