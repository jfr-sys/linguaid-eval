<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mission - Linguaid</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; padding: 24px 16px; color: #1e293b; }
  .card { max-width: 560px; margin: 0 auto; background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  h2 { margin: 0 0 4px; }
  .muted { color: #64748b; font-size: 13px; }
  .info-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .info-table td { padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  .info-table td:first-child { color: #64748b; width: 40%; }
  .devis-form { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f1f5f9; }
  label { display: block; font-size: 12px; color: #475569; margin-bottom: 4px; font-weight: 500; }
  input[type=number] { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
  .rate-note { font-size: 12px; color: #94a3b8; margin-top: -8px; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #1F4E79; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  .status { margin-top: 12px; font-size: 13px; }
  .status.ok { color: #166534; }
  .status.err { color: #b91c1c; }
  .done-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 14px; margin-top: 16px; font-size: 14px; color: #166534; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="muted">Chargement…</div>
  </div>

<script>
const token = window.location.pathname.split('/').pop();

fetch('/mission/' + token + '/data')
  .then(r => { if (!r.ok) throw new Error('Lien invalide ou expiré'); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('card').innerHTML = '<h2>Lien invalide</h2><p class="muted">' + err.message + '</p>';
  });

function render(data) {
  const card = document.getElementById('card');

  const infoRows = [
    ['Apprenant', data.candidateName + (data.candidateCompany ? ' (' + data.candidateCompany + ')' : '')],
    ['Niveau', data.level || '—'],
    ['Volume horaire', data.coachingHours + 'h de coaching, ' + data.homeworkHours + 'h de travail personnel encadré'],
    ['Format', data.format || '—'],
    ['Début souhaité', data.startDate || '—'],
    ['Objectif', data.objective || '—'],
  ].map(([label, val]) => `<tr><td>${label}</td><td>${val}</td></tr>`).join('');

  const docLinks = [];
  if (data.hasReportEN) docLinks.push(`<a href="/mission/${token}/report-en" target="_blank" style="color:#1F4E79;font-weight:600;text-decoration:underline">Evaluation report (EN)</a>`);
  if (data.hasProgramme) docLinks.push(`<a href="/mission/${token}/programme" target="_blank" style="color:#1F4E79;font-weight:600;text-decoration:underline">Programme de formation (FR)</a>`);
  const docsSection = docLinks.length ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin:12px 0"><div style="font-size:12px;color:#475569;font-weight:600;margin-bottom:6px">Documents \u00e0 consulter avant de d\u00e9cider :</div><div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px">${docLinks.join('')}</div></div>` : '';

  if (data.confirmationSigned) {
    card.innerHTML = `
      <h2>Bonjour ${data.trainerFirstName}</h2>
      <div class="done-box">Cette mission est déjà confirmée et signée. Merci !</div>`;
    return;
  }

  if (data.devisAlreadySubmitted) {
    card.innerHTML = `
      <h2>Bonjour ${data.trainerFirstName}</h2>
      <p class="muted">Voici le récapitulatif de la mission proposée.</p>
      <table class="info-table">${infoRows}</table>
      <div class="done-box">Votre devis a bien été transmis. Linguaid reviendra vers vous pour la confirmation de mission.<br><a href="/mission/${token}/devis-pdf" target="_blank" style="color:#166534;font-weight:600">Consulter mon devis (PDF)</a></div>`;
    return;
  }

  const reviewSection = data.devisDraft ? `
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;margin:12px 0">
      <div style="font-weight:600;color:#92400e;margin-bottom:6px">Votre devis est prêt — merci de le vérifier avant de l'envoyer</div>
      <div style="font-size:14px;margin-bottom:8px"><a href="/mission/${token}/devis-pdf" target="_blank" style="color:#1F4E79;font-weight:600;text-decoration:underline">Voir mon devis (PDF)</a> — Total : <strong>${(data.devisTotal || 0).toFixed(2)} € TTC</strong></div>
      <button onclick="confirmDevis()" id="confirmBtn" style="background:#166534">Confirmer et envoyer mon devis</button>
      <div style="font-size:12px;color:#92400e;margin-top:8px">Pour le modifier, ajustez vos tarifs ci-dessous et regénérez.</div>
    </div>` : '';

  card.innerHTML = `
    <h2>Bonjour ${data.trainerFirstName}</h2>
    <p class="muted">Nous souhaitons vous proposer la mission suivante. Vous demeurez naturellement libre de l'accepter ou de la décliner selon vos disponibilités.</p>
    <table class="info-table">${infoRows}</table>
    ${docsSection}
    ${reviewSection}
    <div class="devis-form">
      <p class="muted" style="margin-top:0">${data.devisDraft ? 'Modifier vos tarifs :' : 'Si cette mission vous intéresse, indiquez votre tarif pour générer votre devis :'}</p>
      <label for="coachingRate">Tarif coaching (€/h)</label>
      <input type="number" id="coachingRate" step="0.01" min="0" placeholder="ex : 45" value="${data.devisRate || ''}" />
      <label for="homeworkRate">Tarif travail personnel (€/h)</label>
      <input type="number" id="homeworkRate" step="0.01" min="0" placeholder="ex : 11" value="${data.devisHomeworkRate || ''}" />
      <div class="rate-note">Ces tarifs sont les vôtres — Linguaid ne les préremplit pas.</div>
      <button id="submitBtn" onclick="submitDevis()">${data.devisDraft ? 'Regénérer mon devis' : 'Générer mon devis'}</button>
      <div class="status" id="status"></div>
    </div>`;
}

function submitDevis() {
  const coachingRate = document.getElementById('coachingRate').value;
  const homeworkRate = document.getElementById('homeworkRate').value;
  const status = document.getElementById('status');
  const btn = document.getElementById('submitBtn');

  if (!coachingRate || !homeworkRate) {
    status.className = 'status err';
    status.textContent = 'Merci de renseigner les deux tarifs.';
    return;
  }

  btn.disabled = true; btn.textContent = 'Envoi en cours…';
  fetch('/mission/' + token + '/devis', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ coachingRate: parseFloat(coachingRate), homeworkRate: parseFloat(homeworkRate) }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        status.className = 'status err';
        status.textContent = data.error;
        btn.disabled = false; btn.textContent = 'Générer mon devis';
        return;
      }
      window.location.reload();
    })
    .catch(() => {
      status.className = 'status err';
      status.textContent = 'Erreur réseau, merci de réessayer.';
      btn.disabled = false; btn.textContent = 'Générer mon devis';
    });
}

function confirmDevis() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'Envoi en cours…';
  fetch('/mission/' + token + '/devis-confirm', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
    .then(r => r.json())
    .then(data => {
      if (data.error) { btn.disabled = false; btn.textContent = 'Confirmer et envoyer mon devis'; alert(data.error); return; }
      document.getElementById('card').innerHTML = `
        <h2>Merci !</h2>
        <div class="done-box">Votre devis (${data.total.toFixed(2)} € TTC) a été transmis à Linguaid. Vous recevrez la confirmation de mission une fois validé.<br><a href="/mission/${token}/devis-pdf" target="_blank" style="color:#166534;font-weight:600">Consulter mon devis (PDF)</a></div>`;
    })
    .catch(() => { btn.disabled = false; btn.textContent = 'Confirmer et envoyer mon devis'; alert('Erreur réseau'); });
}
</script>
</body>
</html>
