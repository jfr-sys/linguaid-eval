<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon parcours &mdash; Linguaid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #f5f6fa; color: #222; }
  .header { background: #1F4E79; color: white; padding: 18px 20px; }
  .header h1 { font-size: 1.05rem; font-weight: 600; }
  .container { max-width: 560px; margin: 24px auto; padding: 0 16px 60px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); padding: 22px; }
  .hello { font-size: 1rem; margin-bottom: 4px; }
  .training { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
  .actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .action-btn { display: block; text-align: center; background: #1F4E79; color: white; text-decoration: none;
    padding: 12px 16px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; }
  .action-btn:hover { background: #163d61; }
  .step { display: flex; gap: 14px; position: relative; padding-bottom: 22px; }
  .step:last-child { padding-bottom: 0; }
  .step::before { content: ''; position: absolute; left: 13px; top: 28px; bottom: 0; width: 2px; background: #e5e7eb; }
  .step:last-child::before { display: none; }
  .step.done::before { background: #1F4E79; }
  .dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 0.8rem; font-weight: 700; z-index: 1; }
  .done .dot { background: #1F4E79; color: white; }
  .current .dot { background: #fef3c7; color: #92400e; border: 2px solid #d97706; }
  .todo .dot { background: #f1f5f9; color: #94a3b8; }
  .step-label { font-size: 0.9rem; padding-top: 4px; }
  .done .step-label { color: #1F4E79; font-weight: 600; }
  .current .step-label { font-weight: 700; }
  .todo .step-label { color: #94a3b8; }
  .sub { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .empty { text-align: center; padding: 50px 16px; color: #999; }
  .footer { text-align: center; font-size: 0.72rem; color: #999; margin-top: 26px; line-height: 1.5; }
</style>
</head>
<body>
<div class="header"><h1>Linguaid &mdash; Suivi de votre formation</h1></div>
<div class="container">
  <div class="card">
    <div id="content" class="empty">Chargement&hellip;</div>
  </div>
  <div class="footer">Linguaid France SAS &mdash; 2 rue Herg&eacute;, 66750 Saint Cyprien<br>
    Une question&nbsp;? &Eacute;crivez-nous&nbsp;: jfr@linguaid.net</div>
</div>
<script>
var TOKEN = location.pathname.split('/').pop();
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
async function load() {
  var res = await fetch('/api/mon-parcours/' + encodeURIComponent(TOKEN));
  if (!res.ok) {
    document.getElementById('content').textContent = 'Lien invalide ou expir\u00e9. Contactez-nous si besoin : jfr@linguaid.net';
    return;
  }
  var d = await res.json();
  var html = '<div class="hello">Bonjour ' + esc(d.firstName) + ' \ud83d\udc4b</div>'
    + '<div class="training">' + esc(d.trainingTitle) + '</div>';
  var btns = '';
  if (d.actions.calendly) btns += '<a class="action-btn" href="' + esc(d.actions.calendly) + '">\ud83d\udcc5 R\u00e9server mon entretien oral</a>';
  if (d.actions.sign) btns += '<a class="action-btn" href="' + esc(d.actions.sign) + '">\u270d\ufe0f Signer ma convention</a>';
  if (d.actions.quiz) btns += '<a class="action-btn" href="' + esc(d.actions.quiz) + '">\ud83d\udcdd Compl\u00e9ter mon questionnaire de fin de module</a>';
  if (btns) html += '<div class="actions">' + btns + '</div>';
  for (var i = 1; i <= d.stageCount; i++) {
    var cls = i < d.stageIndex ? 'done' : (i === d.stageIndex ? 'current' : 'todo');
    var mark = i < d.stageIndex ? '\u2713' : i;
    var sub = '';
    if (i === 3 && i === d.stageIndex) {
      sub = d.oralDone ? '<div class="sub">\u2713 Entretien effectu\u00e9</div>'
          : (d.oralBooked ? '<div class="sub">Cr\u00e9neau r\u00e9serv\u00e9 \u2014 \u00e0 venir</div>'
                          : '<div class="sub">En attente de r\u00e9servation</div>');
    }
    if (i === 3 && d.oralDone && i === d.stageIndex) cls = 'done';
    html += '<div class="step ' + cls + '"><div class="dot">' + mark + '</div>'
      + '<div><div class="step-label">' + esc(d.labels[i]) + '</div>' + sub + '</div></div>';
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('content').classList.remove('empty');
}
load();
</script>
</body>
</html>
